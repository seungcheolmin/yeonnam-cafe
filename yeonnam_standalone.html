<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>연남동 카페 창업 도우미</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/MarkerCluster.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/MarkerCluster.Default.css"/>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/leaflet.markercluster.js"></script>
    <style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;}
body{display:flex;flex-direction:column;background:#f8fafc;color:#0f172a;font-family:'Pretendard',sans-serif;}

/* layout */
.h-screen{height:100vh;}
.flex{display:flex;}
.flex-col{flex-direction:column;}
.flex-1{flex:1 1 0%;min-height:0;}
.flex-wrap{flex-wrap:wrap;}
.overflow-hidden{overflow:hidden;}
.overflow-y-auto{overflow-y:auto;}
.relative{position:relative;}
.absolute{position:absolute;}
.shrink-0{flex-shrink:0;}
.z-0{z-index:0;}
.z-20{z-index:20;}
.z-30{z-index:30;}
.z-\[1000\]{z-index:1000;}

/* sizing */
.w-full{width:100%;}
.w-\[300px\]{width:300px;}
.w-px{width:1px;}
.w-4{width:1rem;}
.w-8{width:2rem;}
.w-16{width:4rem;}
.h-full{height:100%;}
.h-1{height:0.25rem;}
.h-4{height:1rem;}
.h-6{height:1.5rem;}
.h-14{height:3.5rem;}
.h-16{height:4rem;}
.h-24{height:6rem;}
.h-screen{height:100vh;}

/* spacing */
.p-2{padding:0.5rem;}
.p-3{padding:0.75rem;}
.p-4{padding:1rem;}
.pb-3{padding-bottom:0.75rem;}
.pb-6{padding-bottom:1.5rem;}
.pt-5{padding-top:1.25rem;}
.px-2{padding-left:0.5rem;padding-right:0.5rem;}
.px-2\.5{padding-left:0.625rem;padding-right:0.625rem;}
.px-3{padding-left:0.75rem;padding-right:0.75rem;}
.px-4{padding-left:1rem;padding-right:1rem;}
.px-5{padding-left:1.25rem;padding-right:1.25rem;}
.px-6{padding-left:1.5rem;padding-right:1.5rem;}
.py-0\.5{padding-top:0.125rem;padding-bottom:0.125rem;}
.py-1{padding-top:0.25rem;padding-bottom:0.25rem;}
.py-1\.5{padding-top:0.375rem;padding-bottom:0.375rem;}
.py-2{padding-top:0.5rem;padding-bottom:0.5rem;}
.py-4{padding-top:1rem;padding-bottom:1rem;}
.mb-1{margin-bottom:0.25rem;}
.mb-2{margin-bottom:0.5rem;}
.mb-3{margin-bottom:0.75rem;}
.ml-3{margin-left:0.75rem;}
.ml-4{margin-left:1rem;}
.mt-2{margin-top:0.5rem;}
.mx-1{margin-left:0.25rem;margin-right:0.25rem;}
.mx-auto{margin-left:auto;margin-right:auto;}

/* flex utils */
.items-center{align-items:center;}
.items-start{align-items:flex-start;}
.justify-between{justify-content:space-between;}
.justify-center{justify-content:center;}
.gap-1{gap:0.25rem;}
.gap-2{gap:0.5rem;}
.gap-3{gap:0.75rem;}
.gap-4{gap:1rem;}
.gap-6{gap:1.5rem;}

/* grid */
.grid{display:grid;}
.grid-cols-2{grid-template-columns:repeat(2,1fr);}
.grid-cols-3{grid-template-columns:repeat(3,1fr);}
.grid-cols-4{grid-template-columns:repeat(4,1fr);}
.col-span-2{grid-column:span 2;}

/* colors */
.bg-white{background:#fff;}
.bg-white\/90{background:rgba(255,255,255,.9);}
.bg-white\/97{background:rgba(255,255,255,.97);}
.bg-slate-50{background:#f8fafc;}
.bg-slate-100{background:#f1f5f9;}
.bg-slate-300{background:#cbd5e1;}
.bg-slate-800{background:#1e293b;}
.bg-blue-50\/60{background:rgba(239,246,255,.6);}
.bg-blue-100{background:#dbeafe;}
.bg-blue-600{background:#2563eb;}
.text-white{color:#fff;}
.text-slate-400{color:#94a3b8;}
.text-slate-500{color:#64748b;}
.text-slate-600{color:#475569;}
.text-slate-800{color:#1e293b;}
.text-slate-900{color:#0f172a;}
.text-blue-600{color:#2563eb;}
.text-green-600{color:#16a34a;}
.text-red-500{color:#ef4444;}

/* borders */
.border{border:1px solid #e2e8f0;}
.border-b{border-bottom:1px solid #e2e8f0;}
.border-t{border-top:1px solid #e2e8f0;}
.border-l{border-left:1px solid #e2e8f0;}
.border-slate-100{border-color:#f1f5f9;}
.border-slate-200{border-color:#e2e8f0;}
.border-blue-100{border-color:#dbeafe;}
.border-blue-200{border-color:#bfdbfe;}

/* typography */
.text-xs{font-size:0.75rem;line-height:1rem;}
.text-sm{font-size:0.875rem;line-height:1.25rem;}
.text-base{font-size:1rem;line-height:1.5rem;}
.text-lg{font-size:1.125rem;line-height:1.75rem;}
.text-xl{font-size:1.25rem;line-height:1.75rem;}
.text-\[10px\]{font-size:10px;}
.text-\[11px\]{font-size:11px;}
.text-\[12px\]{font-size:12px;}
.font-bold{font-weight:700;}
.font-black{font-weight:900;}
.text-center{text-align:center;}
.text-right{text-align:right;}
.uppercase{text-transform:uppercase;}
.tracking-tighter{letter-spacing:-0.05em;}
.tracking-widest{letter-spacing:0.1em;}
.truncate{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.break-keep{word-break:keep-all;}
.leading-none{line-height:1;}

/* border radius */
.rounded{border-radius:0.25rem;}
.rounded-md{border-radius:0.375rem;}
.rounded-lg{border-radius:0.5rem;}
.rounded-xl{border-radius:0.75rem;}
.rounded-2xl{border-radius:1rem;}
.rounded-t-3xl{border-radius:1.5rem 1.5rem 0 0;}
.rounded-full{border-radius:9999px;}

/* shadows */
.shadow-sm{box-shadow:0 1px 2px rgba(0,0,0,.05);}
.shadow-xl{box-shadow:0 20px 25px -5px rgba(0,0,0,.1),0 8px 10px -6px rgba(0,0,0,.1);}
.shadow-\[-5px_0_15px_rgba\(0\,0\,0\,\.03\)\]{box-shadow:-5px 0 15px rgba(0,0,0,.03);}
.shadow-\[0_-10px_40px_rgba\(0\,0\,0\,\.1\)\]{box-shadow:0 -10px 40px rgba(0,0,0,.1);}

/* misc */
.hidden{display:none;}
.cursor-pointer{cursor:pointer;}
.object-cover{object-fit:cover;}
.top-4{top:1rem;}
.left-4{left:1rem;}
.bottom-0{bottom:0;}
.left-0{left:0;}
.right-0{right:0;}
.transform{transform:translateZ(0);}
.transition{transition:all .15s;}
.transition-colors{transition:color .15s,background .15s,border-color .15s;}
.transition-transform{transition:transform .3s;}
.duration-300{transition-duration:.3s;}
.ease-in-out{transition-timing-function:ease-in-out;}
.translate-y-full{transform:translateY(100%);}
.translate-y-0{transform:translateY(0);}
.backdrop-blur-md{backdrop-filter:blur(12px);}
.accent-blue-600{accent-color:#2563eb;}

/* hover */
.hover\:bg-blue-50:hover{background:#eff6ff;}
.hover\:bg-blue-700:hover{background:#1d4ed8;}
.hover\:bg-slate-50:hover{background:#f8fafc;}
.list-card{background:#fff;border:1px solid #e2e8f0;border-radius:10px;padding:8px;cursor:pointer;transition:border-color .15s, box-shadow .15s;}
.list-card:hover{border-color:#93c5fd;box-shadow:0 1px 6px rgba(37,99,235,0.08);}
.list-card.active{border-color:#2563eb;box-shadow:0 0 0 2px rgba(37,99,235,0.15);}
.diag-panel{display:none;}
.diag-panel.active{display:block;}
.diag-tab{padding:4px 12px;font-size:11px;font-weight:700;border-radius:8px;border:1px solid #e2e8f0;background:#fff;color:#94a3b8;cursor:pointer;}
.diag-tab.active{background:#2563eb;color:#fff;border-color:#2563eb;}
.popup-img{width:160px;height:100px;object-fit:cover;display:block;}

/* position */
.inset-0{top:0;right:0;bottom:0;left:0;}

@keyframes slideIn {from{transform:translateX(100%)}to{transform:translateX(0)}}
</style>
    <script>
let _sortMode = 'default';
function setSortMode(mode) {
    _sortMode = mode;
    ['default','rent','area'].forEach(m => {
        const btn = document.getElementById('sort-'+m);
        if(!btn) return;
        const active = m === mode;
        btn.style.background = active ? '#2563eb' : '#fff';
        btn.style.color = active ? '#fff' : '#94a3b8';
        btn.style.borderColor = active ? '#2563eb' : '#e2e8f0';
    });
    updateView();
}
function openDetail(id) {
    id = Number(id);
    const p = data.find(x => x['ID(매물번호)'] === id);
    if(!p) return;
    const url = p['link'] || `https://www.serve.co.kr/good/map?m=4&lat=${p['위도']}&lng=${p['경도']}&atcl=${id}`;
    const flStr = p['층수']===-1?'B1층':p['층수']+'층';
    const existing = document.getElementById('prop-detail-overlay');
    if(existing) existing.remove();
    const overlay = document.createElement('div');
    overlay.id = 'prop-detail-overlay';
    overlay.style.cssText = 'position:absolute;top:0;right:380px;width:320px;height:100%;background:#fff;z-index:9999;box-shadow:-4px 0 20px rgba(0,0,0,0.12);display:flex;flex-direction:column;animation:slideIn .2s ease;overflow:hidden;';
    overlay.innerHTML = `
        <div style="flex-shrink:0;padding:12px 14px;border-bottom:1px solid #e2e8f0;display:flex;align-items:center;justify-content:space-between;">
            <span style="font-size:12px;font-weight:700;color:#1e293b;">📋 매물 상세</span>
            <button onclick="document.getElementById('prop-detail-overlay').remove()" style="background:none;border:none;font-size:18px;cursor:pointer;color:#94a3b8;">×</button>
        </div>
        <div style="overflow-y:auto;flex:1;min-height:0;padding:14px;display:flex;flex-direction:column;gap:10px;">
            <img src="${p['사진URL']||''}" style="width:100%;height:180px;object-fit:cover;border-radius:10px;background:#f1f5f9;" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=\'http://www.w3.org/2000/svg\' viewBox=\'0 0 320 180\'%3E%3Crect width=\'320\' height=\'180\' fill=\'%23f1f5f9\'/%3E%3Ctext x=\'160\' y=\'95\' text-anchor=\'middle\' fill=\'%2394a3b8\' font-size=\'13\' font-family=\'sans-serif\'%3E이미지 준비중%3C/text%3E%3C/svg%3E'">
            <div style="display:flex;gap:6px;flex-wrap:wrap;">
                <span style="background:#eff6ff;color:#2563eb;font-size:10px;font-weight:700;padding:3px 8px;border-radius:6px;">ZONE ${p.zone}</span>
                <span style="background:#f1f5f9;color:#64748b;font-size:10px;font-weight:700;padding:3px 8px;border-radius:6px;">${flStr}</span>
                <span style="background:#f1f5f9;color:#64748b;font-size:10px;font-weight:700;padding:3px 8px;border-radius:6px;">${p.pyeong}평</span>
            </div>
            <div style="font-size:18px;font-weight:900;color:#1e293b;">보 ${p['보증금'].toLocaleString()} / ${p['월세']}만</div>

            <!-- 📌 매물 정보 -->
            <div style="border:1px solid #e2e8f0;border-radius:8px;">
                <div style="background:#eff6ff;padding:7px 12px;font-size:10px;font-weight:700;color:#2563eb;">📌 매물 정보</div>
                <div style="padding:12px 14px;display:grid;grid-template-columns:50px 1fr;gap:8px;font-size:12px;align-items:center;max-height:120px;overflow-y:auto;">
                    <span style="color:#94a3b8;">보증금</span><b>${p['보증금'].toLocaleString()}만원</b>
                    <span style="color:#94a3b8;">월세</span><b>${p['월세']}만원</b>
                    <span style="color:#94a3b8;">면적</span><b>${p.pyeong}평</b>
                    <span style="color:#94a3b8;">층수</span><b>${flStr}</b>
                </div>
            </div>

            <!-- 📝 매물 특징 -->
            <div style="border:1px solid #e2e8f0;border-radius:8px;">
                <div style="background:#f0fdf4;padding:7px 12px;font-size:10px;font-weight:700;color:#16a34a;">📝 매물 특징</div>
                <div style="padding:10px 12px;font-size:11px;color:#475569;line-height:1.7;word-break:break-all;white-space:normal;max-height:100px;overflow-y:auto;">${p['특징']||'정보 없음'}</div>
            </div>

            <!-- 📄 상세 설명 -->
            ${p['detail'] ? `
            <div style="border:1px solid #e2e8f0;border-radius:8px;overflow:hidden;">
                <div style="background:#fefce8;padding:7px 12px;font-size:10px;font-weight:700;color:#854d0e;">📄 상세 설명</div>
                <div style="padding:10px 12px;font-size:10px;color:#475569;line-height:1.8;max-height:220px;overflow-y:auto;">${p['detail'].replace(/\n/g,'<br>')}</div>
            </div>` : ''}
        </div>`;
    document.body.appendChild(overlay);
}
function toggleBookmark(id) {
    const sid = String(id);
    if(bookmarks.has(sid)) bookmarks.delete(sid);
    else bookmarks.add(sid);
    localStorage.setItem('yeonnam_bookmarks', JSON.stringify([...bookmarks]));
    const btn = document.getElementById('bm-'+id);
    if(btn) btn.textContent = bookmarks.has(sid) ? '⭐' : '☆';
    const popBtn = document.getElementById('pop-bm-'+id);
    if(popBtn) popBtn.textContent = bookmarks.has(sid) ? '⭐' : '☆';
}

function renderBookmarks() {
    const el = document.getElementById('panel-bookmark');
    if(!el) return;
    const bmList = [...bookmarks].map(id => data.find(p=>String(p['ID(매물번호)'])===id)).filter(Boolean);
    if(bmList.length === 0) {
        el.innerHTML = '<div style="padding:24px;text-align:center;color:#94a3b8;font-size:11px;">☆ 저장한 매물이 없습니다.<br><span style="font-size:10px;">매물 카드의 ☆ 버튼을 눌러 저장하세요.</span></div>';
        return;
    }
    el.innerHTML = '<div style="padding:8px 8px 4px;font-size:11px;font-weight:700;color:#475569;">저장된 매물 '+bmList.length+'개</div>'
        + bmList.map(p => {
            const id = p['ID(매물번호)'];
            const flStr = p['층수']===-1?'B1층':p['층수']+'층';
            const photo = p['사진URL']||'data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAyMDAgODAiPjxyZWN0IHdpZHRoPSIyMDAiIGhlaWdodD0iODAiIGZpbGw9IiNmMWY1ZjkiLz48dGV4dCB4PSIxMDAiIHk9IjQ1IiB0ZXh0LWFuY2hvcj0ibWlkZGxlIiBmaWxsPSIjOTRhM2I4IiBmb250LXNpemU9IjExIj7J2066y47KCc6riIPC90ZXh0Pjwvc3ZnPg==';
            return '<div class="list-card" onclick="clickListItem('+id+','+p['위도']+','+p['경도']+')" style="cursor:pointer;">'
                + '<img src="'+photo+'" class="w-full h-20 object-cover rounded-lg mb-2" style="background:#f1f5f9;" onerror="this.src=\'data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAyMDAgODAiPjxyZWN0IHdpZHRoPSIyMDAiIGhlaWdodD0iODAiIGZpbGw9IiNmMWY1ZjkiLz48dGV4dCB4PSIxMDAiIHk9IjQ1IiB0ZXh0LWFuY2hvcj0ibWlkZGxlIiBmaWxsPSIjOTRhM2I4IiBmb250LXNpemU9IjExIj7J2066y47KCc6riIPC90ZXh0Pjwvc3ZnPg==\'">'
                + '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;">'
                + '<span style="padding:2px 6px;border-radius:4px;background:#f1f5f9;font-size:10px;font-weight:700;color:#64748b;">ZONE '+p.zone+' '+flStr+' · '+(p.pyeong||p['평수(전용)']||'')+'평</span>'
                + '<button onclick="event.stopPropagation();toggleBookmark('+id+');renderBookmarks();" style="background:none;border:none;cursor:pointer;font-size:14px;">⭐</button>'
                + '</div>'
                + '<div style="font-size:12px;font-weight:900;color:#1e293b;margin-bottom:2px;">보 '+p['보증금'].toLocaleString()+' / '+p['월세']+'</div>'
                + '<div style="font-size:10px;color:#94a3b8;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">'+(p['특징']||'')+'</div>'
                + '</div>';
        }).join('');
}
function switchRightTab(tab) {
    const dash = document.getElementById('panel-dash');
    const list = document.getElementById('panel-list');
    const bm = document.getElementById('panel-bookmark');
    if(!dash || !list) return;
    dash.style.display = 'none';
    list.style.display = 'none';
    if(bm) bm.style.display = 'none';
    if(tab==='dash') dash.style.display = 'block';
    else if(tab==='list') { list.style.display='flex'; list.style.flexDirection='column'; }
    else if(tab==='bookmark' && bm) { bm.style.display='flex'; bm.style.flexDirection='column'; renderBookmarks(); }
    ['tab-dash','tab-list','tab-bookmark'].forEach(id => {
        const el = document.getElementById(id);
        if(!el) return;
        const active = (id === 'tab-'+tab);
        el.style.background = active ? '#2563eb' : 'transparent';
        const span = el.querySelectorAll('span')[1];
        if(span) span.style.color = active ? '#fff' : '#94a3b8';
    });
    if(tab==='dash') {
        if(typeof renderDashboard === 'function' && typeof currentZone !== 'undefined') renderDashboard(currentZone);
    }
}
</script>
</head>
<body class="h-screen flex flex-col overflow-hidden bg-slate-50 text-slate-900">

<!-- ── HEADER ── -->
<header class="h-16 border-b flex items-center px-6 gap-6 z-30 bg-white shadow-sm shrink-0">
    <h1 class="text-sm font-black text-blue-600 tracking-tighter">연남동 카페 창업 도우미</h1>

    <div class="flex items-center gap-4 flex-1 bg-slate-50 px-4 py-2 rounded-xl border border-slate-100">
        <input type="number" id="maxD" placeholder="보증금(이하)" class="filter-input" oninput="updateView()">
        <input type="number" id="maxR" placeholder="월세(이하)"  class="filter-input" oninput="updateView()">
        <input type="number" id="maxA" placeholder="면적(평 이하)" class="filter-input" oninput="updateView()">
        <div class="h-6 w-px bg-slate-300 mx-1"></div>
        <div class="flex gap-3 items-center">
            <label class="chk-label"><input type="checkbox" id="chk-b1" checked onchange="updateView()" class="accent-blue-600"> B1층</label>
            <label class="chk-label"><input type="checkbox" id="chk-1f" checked onchange="updateView()" class="accent-blue-600"> 1층</label>
            <label class="chk-label"><input type="checkbox" id="chk-2f" checked onchange="updateView()" class="accent-blue-600"> 2층</label>
        </div>

    </div>

    <div class="flex items-center gap-4 shrink-0">
        <div id="avgTag" class="text-[12px] font-bold text-slate-500 bg-slate-100 px-3 py-1.5 rounded-lg border border-slate-200">평균 분석중...</div>
        <div id="countTag" class="text-lg font-black text-blue-600 w-16 text-right">0 건</div>

        <!-- 선택 배지 + 진단 버튼 -->
        <div id="selectedBadgeContainer" class="hidden items-center gap-2">
            <div id="selectedBadge" class="text-[11px] font-bold text-blue-600 bg-blue-100 px-2.5 py-1 rounded-md border border-blue-200" style="max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;"></div>
            <div style="display:flex;align-items:center;gap:4px;background:#f1f5f9;border-radius:8px;padding:3px;">
                <button id="biz-takeout" onclick="setBiz('takeout')" style="font-size:11px;font-weight:700;padding:3px 10px;border-radius:6px;border:none;cursor:pointer;background:#2563eb;color:#fff;transition:all .15s;">테이크아웃</button>
                <button id="biz-hall"    onclick="setBiz('hall')"    style="font-size:11px;font-weight:700;padding:3px 10px;border-radius:6px;border:none;cursor:pointer;background:transparent;color:#94a3b8;transition:all .15s;">홀 중심</button>
            </div>
            <input type="hidden" id="bizType" value="takeout">
            <button onclick="openDiag()" class="text-[11px] font-bold bg-blue-600 text-white px-3 py-1 rounded-md shadow-sm hover:bg-blue-700 transition-colors">상권 진단하기 🔍</button>
        </div>
    </div>
</header>

<!-- ── MAIN ── -->
<main class="flex flex-1 overflow-hidden">

    <!-- 지도 영역 -->
    <div class="flex-1 relative overflow-hidden">
        <div id="map" class="w-full h-full z-0"></div>

const ZONE_SCORE = { 'A': 55.8, 'B': 40.7, 'C': 63.4, 'W': 40.1 };

function calcScore(prop, bizType) {
    const zoneScore = ZONE_SCORE[prop.zone] ?? 0;

    // 업종 적합성 (10점)
    const bizScore = bizType === 'takeout'
        ? (prop.pyeong < 15 ? 10 : 5)
        : (prop.pyeong >= 15 ? 10 : 5);

    // 층수 (10점)
    const floorScore = prop['층수'] === 1 ? 10 : (prop['층수'] === -1 || prop['층수'] === 2) ? 5 : 0;

    // 역거리 (10점)
    const walk = walkCache[prop['ID(매물번호)']];
    const walkScore = !walk?.walk_m ? 0 : walk.walk_m <= 500 ? 10 : walk.walk_m <= 1000 ? 5 : 0;

    const propScore = bizScore + floorScore + walkScore;
    const total = Math.min(90, Math.round(zoneScore + propScore));

    const grade =
        total >= 80 ? {label:'매우 적합', color:'#1a8a4a'} :
        total >= 70 ? {label:'적합',      color:'#3b82f6'} :
        total >= 60 ? {label:'보통',      color:'#f59e0b'} :
                      {label:'주의',      color:'#f97316'};

    return {total, zoneScore: Math.round(zoneScore), propScore, bizScore, floorScore, walkScore, grade};
}

// ── TMap (좌표 기반 캐시 공유 + 병렬 배치)
const coordCache = {};  // "lat,lon" → {walk_min, walk_m}
const coordFlight = {}; // "lat,lon" → promise

function coordKey(p) {
    return `${p['위도'].toFixed(5)},${p['경도'].toFixed(5)}`;
}

// TMap 차단 플래그 - 403 뜨면 즉시 전체 중단
let tmapBlocked = false; // 페이지 로드마다 리셋

async function fetchWalkTime(prop) {
    if(tmapBlocked) return {walk_min:null, walk_m:null};
    const id = prop['ID(매물번호)'];
    if (walkCache[id]) return walkCache[id];
    const ck = coordKey(prop);
    if (coordCache[ck]) { walkCache[id]=coordCache[ck]; return coordCache[ck]; }
    if (coordFlight[ck]) { const r=await coordFlight[ck]; walkCache[id]=r; return r; }

    const promise = fetch('https://apis.openapi.sk.com/tmap/routes/pedestrian?version=1&format=json', {
        method:'POST',
        headers:{'appKey':TMAP_KEY,'Content-Type':'application/json'},
        body: JSON.stringify({
            startX:ORIGIN.lon, startY:ORIGIN.lat,
            endX:prop['경도'], endY:prop['위도'],
            startName:'홍대입구역3번출구', endName:'매물',
            reqCoordType:'WGS84GEO', resCoordType:'WGS84GEO', speed:4
        })
    }).then(r=>{
        if(r.status===403){ tmapBlocked=true; throw new Error('403 - localhost 도메인 차단'); }
        return r.json();
    }).then(d=>{
        const fp=d.features[0].properties;
        const r={walk_min:Math.round(fp.totalTime/60), walk_m:Math.round(fp.totalDistance)};
        coordCache[ck]=r; walkCache[id]=r; delete coordFlight[ck]; return r;
    }).catch(()=>{
        const r={walk_min:null, walk_m:null};
        coordCache[ck]=r; walkCache[id]=r; delete coordFlight[ck]; return r;
    });
    coordFlight[ck]=promise; return promise;
}

async function prefetchZone(zone) {
    if(tmapBlocked) return;
    data.filter(p=>p.zone===zone).forEach(p=>{
        const ck=coordKey(p);
        if(coordCache[ck]) walkCache[p['ID(매물번호)']]=coordCache[ck];
    });
    const seen=new Set();
    const needFetch=data.filter(p=>{
        if(p.zone!==zone) return false;
        const ck=coordKey(p);
        if(coordCache[ck]||seen.has(ck)) return false;
        seen.add(ck); return true;
    });
    if(!needFetch.length){ renderWalkBadges(); updateAccessTab(); return; }

    const total=needFetch.length;
    let done=0;

    function showProgress(){
        const el=document.getElementById('ac-rank');
        if(!el) return;
        if(tmapBlocked){
            el.innerHTML=`<div style="padding:16px;text-align:center;font-size:11px;">
                <div style="color:#ef4444;font-weight:700;margin-bottom:4px;">⚠️ TMap API 차단 (localhost)</div>
                <div style="color:#94a3b8;">SK Open API 콘솔 → 앱 설정 → 도메인에<br><b>localhost</b> 추가 후 새로고침</div>
            </div>`;
            return;
        }
        const pct=Math.round(done/total*100);
        el.innerHTML=`<div style="padding:12px 0;">
            <div style="display:flex;justify-content:space-between;font-size:11px;color:#64748b;margin-bottom:6px;">
                <span>🚶 계산 중... ${done}/${total}곳</span>
                <span style="font-weight:700;color:#3b82f6;">${pct}%</span>
            </div>
            <div style="height:6px;background:#e2e8f0;border-radius:3px;overflow:hidden;">
                <div style="height:100%;width:${pct}%;background:#3b82f6;border-radius:3px;"></div>
            </div>
        </div>`;
    }
    showProgress();

    const BATCH=5;
    for(let i=0;i<needFetch.length;i+=BATCH){
        if(tmapBlocked){ showProgress(); break; }
        await Promise.all(needFetch.slice(i,i+BATCH).map(p=>fetchWalkTime(p)));
        done+=Math.min(BATCH, needFetch.length-i);
        data.filter(p=>p.zone===zone).forEach(p=>{
            const ck=coordKey(p);
            if(coordCache[ck]) walkCache[p['ID(매물번호)']]=coordCache[ck];
        });
        renderWalkBadges();
        showProgress();
        if(i+BATCH<needFetch.length) await new Promise(r=>setTimeout(r,200));
    }
    if(!tmapBlocked) updateAccessTab();
}

function walkBadgeHtml(id) {
    const c = walkCache[id];
    if(!c) return `<span class="walk-badge walk-loading">🚶 계산중</span>`;
    if(c.walk_min===null) return '';
    const cls = c.walk_min<=7?'walk-fast':c.walk_min<=12?'walk-mid':'walk-slow';
    const dist = c.walk_m>=1000?(c.walk_m/1000).toFixed(1)+'km':c.walk_m+'m';
    return `<span class="walk-badge ${cls}">🚶 ${c.walk_min}분 · ${dist}</span>`;
}

function renderWalkBadges() {
    data.filter(p=>p.zone===currentZone).forEach(p=>{
        const id=p['ID(매물번호)'];

        if(el) el.innerHTML=walkBadgeHtml(id);
    });
    // 도보시간 나오면 마커 색도 즉시 갱신
    requestAnimationFrame(()=>{
        markers.eachLayer(m=>{
            if(!m._latlng) return;
            const p = data.find(d=>d['위도']===m._latlng.lat && d['경도']===m._latlng.lng);
            if(!p) return;
            const id=p['ID(매물번호)'];
            if(id===selectedId) return; // 선택된 건 핀 유지
            const c=walkCache[id];
            if(c&&c.walk_min!==null&&c.walk_min>0){
                const mc=c.walk_min<=7?'#1a8a4a':c.walk_min<=12?'#f59e0b':'#d93025';
                m.setIcon(makeCircleIcon(mc));
            }
        });
    });
}

// ripple 원 관리
let rippleCircle = null;
function addRipple(m) {
    removeRipple();
    if(!m._map || !m._path) return;
    const pt = m._map.latLngToLayerPoint(m.getLatLng());
    const svg = m._path.closest('svg') || m._map.getPanes().overlayPane.querySelector('svg');
    if(!svg) return;
    const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
    circle.setAttribute('cx', pt.x);
    circle.setAttribute('cy', pt.y);
    circle.setAttribute('r', '10');
    circle.classList.add('marker-ripple');
    svg.appendChild(circle);
    rippleCircle = circle;
}
function removeRipple() {
    if(rippleCircle) { rippleCircle.remove(); rippleCircle = null; }
}

function makeCircleIcon(color) {
    const svg = '<svg width="14" height="14" viewBox="0 0 14 14" xmlns="http://www.w3.org/2000/svg">'
        + '<circle cx="7" cy="7" r="6" fill="' + color + '" stroke="#fff" stroke-width="1.5"/>'
        + '</svg>';
    return L.divIcon({html:svg, className:'', iconSize:[14,14], iconAnchor:[7,7], popupAnchor:[0,-7]});
}

L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}.png',{attribution:''}).addTo(map);

const originIcon = L.divIcon({className:'', html:'<div class="origin-label">🚉 홍대입구역 3번출구</div>', iconAnchor:[80,12]});
L.marker([ORIGIN.lat,ORIGIN.lon],{icon:originIcon,zIndexOffset:1000}).addTo(map);

const polyLayers = {
    A: L.polygon(poly_A,{color:'#ef4444',fillColor:'#ef4444',fillOpacity:.1,weight:2,dashArray:'5,5'}).addTo(map),
    B: L.polygon(poly_B,{color:'#3b82f6',fillColor:'#3b82f6',fillOpacity:.1,weight:2,dashArray:'5,5'}).addTo(map),
    W: L.polygon(poly_W,{color:'#f59e0b',fillColor:'#f59e0b',fillOpacity:.1,weight:2,dashArray:'5,5'}).addTo(map),
    C: L.polygon(poly_C,{color:'#10b981',fillColor:'#10b981',fillOpacity:.1,weight:2,dashArray:'5,5'}).addTo(map),
};
const ZONE_COLORS = {A:'#ef4444',B:'#3b82f6',W:'#f59e0b',C:'#10b981'};
const markerPool = new Map(); // id → circleMarker 재사용 풀
let markers = L.markerClusterGroup({
    maxClusterRadius: 1,           // 거의 같은 좌표만 클러스터링
    showCoverageOnHover: false,
    spiderfyOnMaxZoom: true,
    spiderfyDistanceMultiplier: 1.5,
    zoomToBoundsOnClick: false,    // 클릭 시 줌 말고 spiderfy
    disableClusteringAtZoom: 20,   // 최대줌에서도 클러스터 유지 (spiderfy용)
    iconCreateFunction: function(cluster) {
        const count = cluster.getChildCount();
        const color = ZONE_COLORS[currentZone] || '#3b82f6';
        return L.divIcon({
            html: '<div style="width:26px;height:26px;background:'+color+';border:2px solid #fff;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:900;font-size:11px;box-shadow:0 2px 6px rgba(0,0,0,.2);">'+count+'</div>',
            className: '', iconSize: [26,26], iconAnchor: [13,13]
        });
    }
}).addTo(map);

function selectArea(z) {
    currentZone = z; selectedId = null;
    updateDiagState(null);
    ['A','B','W','C'].forEach(id=>{
        document.getElementById('btn-'+id).className = id===z
            ? 'px-5 py-2 text-xs font-black rounded-xl bg-blue-600 text-white shadow-lg'
            : 'px-5 py-2 text-xs font-black rounded-xl border bg-white text-slate-400 hover:bg-slate-50';
        polyLayers[id].setStyle({fillOpacity:id===z?.25:.02, weight:id===z?4:1, opacity:id===z?1:.2});
    });
    map.flyToBounds(polyLayers[z].getBounds(),{padding:[30,30],duration:1});
    updateView();
    // 대시보드 탭 열려있으면 갱신
    if(document.getElementById('panel-dash') && document.getElementById('panel-dash').style.display !== 'none') renderDashboard(z);
    // prefetch 제거 - 진단하기 클릭 시 해당 매물만 조회
}

window.clickListItem = function(id, lat, lon) {
    selectedId = id;

    // 1. 마커 즉시 하이라이트
    markerPool.forEach((m, mid) => {
        const isSel = mid === id;
        const p = data.find(d => d['ID(매물번호)'] === mid);
        if(!p) return;
        const c = walkCache[mid];
        const zc = ZONE_COLORS[currentZone];
        let mc = zc;
        if(c && c.walk_min !== null && c.walk_min > 0)
            mc = c.walk_min<=7?'#1a8a4a':c.walk_min<=12?'#f59e0b':'#d93025';
        if(isSel) {
            m.setIcon(makePinIcon('#2563eb', true));
            m.setZIndexOffset(1000);
            const el = m.getElement();
            if(el) el.classList.add('pin-selected');
        } else {
            m.setIcon(makeCircleIcon(mc));
            m.setZIndexOffset(0);
            const el = m.getElement();
            if(el) el.classList.remove('pin-selected');
        }
    });

    // 2. 배지/진단 즉시 업데이트
    const selProp = data.find(p => p['ID(매물번호)'] === id);
    if(selProp) updateDiagState(selProp);

    // 3. 지도 이동 + 팝업 열기
    if(lat && lon) {
        map.flyTo([lat, lon], 17, {duration:.5});
        setTimeout(() => {
            markerPool.forEach((m, mid) => {
                if(mid === id || mid === Number(id)) {
                    if(markers.zoomToShowLayer) {
                        markers.zoomToShowLayer(m, () => { setTimeout(() => m.openPopup(), 200); });
                    } else {
                        m.openPopup();
                    }
                }
            });
        }, 600);
    }

    // 4. 즉시 렌더 후 스크롤
    if(_updateTimer) clearTimeout(_updateTimer);
    _doUpdateView();
    setTimeout(()=>{
        const el = document.getElementById('card-'+id);
        if(el) {
            document.querySelectorAll('.list-card').forEach(c => c.classList.remove('active'));
            el.classList.add('active');
            el.scrollIntoView({behavior:'smooth', block:'nearest'});
        }
    }, 50);
};

let _updateTimer = null;
function updateView() {
    if(_updateTimer) clearTimeout(_updateTimer);
    _updateTimer = setTimeout(_doUpdateView, 80);
}
function _doUpdateView() {
    const maxD = parseInt(document.getElementById('maxD').value)||999999;
    const maxR = parseInt(document.getElementById('maxR').value)||999999;
    const maxA = parseInt(document.getElementById('maxA').value)||999999;
    const chkB1 = document.getElementById('chk-b1').checked;
    const chk1F = document.getElementById('chk-1f').checked;
    const chk2F = document.getElementById('chk-2f').checked;

    const filtered = data.filter(p=>{
        if(p.zone!==currentZone) return false;
        if(p['보증금']>maxD||p['월세']>maxR||p.pyeong>maxA) return false;
        const fl=p['층수'];
        if(fl===-1&&!chkB1) return false;
        if(fl===1&&!chk1F) return false;
        if(fl===2&&!chk2F) return false;
        return true;
    });

    if(_sortMode === 'rent') filtered.sort((a,b) => a['월세'] - b['월세']);
    else if(_sortMode === 'area') filtered.sort((a,b) => b.pyeong - a.pyeong);

    markers.clearLayers();
    const zc = ZONE_COLORS[currentZone];
    let sumD=0,sumR=0,sumP=0;

    filtered.forEach(p=>{
        sumD+=p['보증금']; sumR+=p['월세']; sumP+=p.pyeong;
    });

    // selectedId로 직접 찾기 (필터에 없어도 유지)
    const currentSelectedData = selectedId ? data.find(p=>p['ID(매물번호)']===selectedId) : null;

    // 마커 실제 렌더 (RAF + 배치 추가로 클러스터 성능 최적화)
    function renderMarkers() {
        markers.clearLayers();
        const filteredIds = new Set(filtered.map(p=>p['ID(매물번호)']));
        markerPool.forEach((m,id)=>{ if(!filteredIds.has(id)) markerPool.delete(id); });

        const layerBatch = [];
        filtered.forEach(p=>{
            const id=p['ID(매물번호)'];
            const isSel=id===selectedId;
            const c=walkCache[id];
            let mc=zc;
            if(c&&c.walk_min!==null&&c.walk_min>0)
                mc=c.walk_min<=7?'#1a8a4a':c.walk_min<=12?'#f59e0b':'#d93025';

            let m = markerPool.get(id);
            if(m) {
                if(isSel) {
                    m.setIcon(makePinIcon('#2563eb', true));
                    m.setZIndexOffset(1000);
                } else {
                    m.setIcon(makeCircleIcon(mc));
                    m.setZIndexOffset(0);
                }
            } else {
                m = L.marker([p['위도'],p['경도']], {
                    icon: isSel ? makePinIcon('#2563eb', true) : makeCircleIcon(mc),
                    zIndexOffset: isSel ? 1000 : 0
                });
                const BLANK='data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAyMDAgODAiPjxyZWN0IHdpZHRoPSIyMDAiIGhlaWdodD0iODAiIGZpbGw9IiNmMWY1ZjkiLz48dGV4dCB4PSIxMDAiIHk9IjQ1IiB0ZXh0LWFuY2hvcj0ibWlkZGxlIiBmaWxsPSIjOTRhM2I4IiBmb250LXNpemU9IjExIj7J2066y47KCc6riIPC90ZXh0Pjwvc3ZnPg==';
                const photo=p['사진URL']||BLANK;
                m.bindPopup(`<img src="${photo}" class="popup-img" onerror="this.src='${BLANK}'"><div style="padding:6px 8px;"><div style="font-size:11px;font-weight:700;color:#1e293b;text-align:center;margin-bottom:4px;">보 ${p['보증금']} / ${p['월세']}</div><div style="text-align:center;"><button id="pop-bm-${id}" onclick="event.stopPropagation();toggleBookmark(${id});this.textContent=bookmarks.has(String(${id}))?'⭐':'☆';" style="background:none;border:none;cursor:pointer;font-size:20px;line-height:1;padding:0;">${bookmarks.has(String(id))?'⭐':'☆'}</button></div></div>`,{closeButton:true,offset:[0,-4],autoPan:false,maxWidth:160});
                m.on('mouseover',function(){ this.openPopup(); });
                m.on('mouseout',function(){ if(id!==selectedId) this.closePopup(); });
                m.on('click',function(){ clickListItem(id,p['위도'],p['경도']); setTimeout(()=>this.openPopup(), 50); });
                markerPool.set(id, m);
            }
            layerBatch.push(m);
        });
        markers.addLayers(layerBatch);
    }
    requestAnimationFrame(renderMarkers);

    // 리스트 (최대 40개씩 지연 렌더)
    const count=filtered.length;
    const infoPanel=document.getElementById('panel-list-inner');
    if(!count){
        infoPanel.innerHTML='<div class="flex h-full items-center justify-center text-slate-400 text-xs font-bold">해당 조건의 매물이 없습니다.</div>';
        document.getElementById('avgTag').innerText='데이터 없음';
    } else {
        document.getElementById('avgTag').innerHTML=`평균 <span class="text-blue-600">${Math.round(sumP/count)}평</span> / <span class="text-blue-600">보증금 ${Math.round(sumD/count)}만</span> / <span class="text-blue-600">월세 ${Math.round(sumR/count)}만</span>`;

        let renderCount = 40;
        function renderCards() {
            // 선택된 매물이 renderCount 밖이면 포함될 때까지 늘리기
            if(selectedId) {
                const selIdx = filtered.findIndex(p => p['ID(매물번호)'] === selectedId);
                if(selIdx >= renderCount) renderCount = selIdx + 1;
            }
            const slice = filtered.slice(0, renderCount);
            infoPanel.innerHTML = slice.map(p=>{
                const id=p['ID(매물번호)'];
                const isSel=id===selectedId;
                const flStr=p['층수']===-1?'B1층':p['층수']+'층';
                const photo=p['사진URL']||'data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAyMDAgODAiPjxyZWN0IHdpZHRoPSIyMDAiIGhlaWdodD0iODAiIGZpbGw9IiNmMWY1ZjkiLz48dGV4dCB4PSIxMDAiIHk9IjQ1IiB0ZXh0LWFuY2hvcj0ibWlkZGxlIiBmaWxsPSIjOTRhM2I4IiBmb250LXNpemU9IjExIj7J2066y47KCc6riIPC90ZXh0Pjwvc3ZnPg==';
                const isBookmarked = bookmarks.has(String(id));
                return `<div id="card-${id}" class="list-card${isSel?' active':''}" onclick="clickListItem(${id},${p['위도']},${p['경도']})">
                    <img data-src="${photo}" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 1 1'%3E%3C/svg%3E" class="w-full h-20 object-cover rounded-lg mb-2 lazy-img" style="background:#f1f5f9;" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=\'http://www.w3.org/2000/svg\' viewBox=\'0 0 200 80\'%3E%3Crect width=\'200\' height=\'80\' fill=\'%23f1f5f9\'/%3E%3Ctext x=\'100\' y=\'45\' text-anchor=\'middle\' fill=\'%2394a3b8\' font-size=\'11\' font-family=\'sans-serif\'%3E이미지 준비중%3C/text%3E%3C/svg%3E'">
                    <div class="flex items-center justify-between mb-1">
                        <span class="px-2 py-0.5 rounded bg-slate-100 text-[10px] font-bold text-slate-500">ZONE ${p.zone} ${flStr} · ${p.pyeong}평</span>
                        <button onclick="event.stopPropagation();toggleBookmark(${id})" id="bm-${id}" style="background:none;border:none;cursor:pointer;font-size:16px;padding:2px 4px;line-height:1;">${isBookmarked?'⭐':'☆'}</button>
                    </div>
                    <h3 class="text-sm font-black text-slate-800 leading-none mb-1">보 ${p['보증금'].toLocaleString()} / ${p['월세']}</h3>
                    <p class="text-xs text-slate-500 truncate">${p['특징']||''}</p>
                    <button onclick="event.stopPropagation();openDetail(${id});" style="display:block;width:100%;margin-top:6px;text-align:center;font-size:10px;font-weight:700;color:#2563eb;background:#eff6ff;border:1px solid #bfdbfe;border-radius:6px;padding:4px 0;cursor:pointer;">🔗 매물 상세보기</button>
                </div>`;
            }).join('') + (renderCount < filtered.length
                ? `<div id="load-more" style="text-align:center;padding:12px;font-size:11px;color:#94a3b8;cursor:pointer;" onclick="loadMore()">▼ ${filtered.length - renderCount}개 더 보기</div>`
                : '');
            slice.forEach(p=>{
                const id=p['ID(매물번호)'];
                const card=document.getElementById('card-'+id);
                if(card) card.onclick=()=>clickListItem(id,p['위도'],p['경도']);
            });
            // IntersectionObserver로 뷰포트 진입 시에만 이미지 로드
            if(window._imgObserver) window._imgObserver.disconnect();
            window._imgObserver = new IntersectionObserver((entries)=>{
                entries.forEach(e=>{
                    if(e.isIntersecting){
                        const img = e.target;
                        img.src = img.dataset.src;
                        window._imgObserver.unobserve(img);
                    }
                });
            }, {rootMargin:'100px'});
            document.querySelectorAll('.lazy-img').forEach(img=>window._imgObserver.observe(img));
        }
        window._currentFiltered = filtered;
        window.loadMore = function() {
            renderCount += 40;
            renderCards();
            // 선택된 카드 스크롤 복원
            if(selectedId){ const el=document.getElementById('card-'+selectedId); if(el) el.scrollIntoView({block:'nearest'}); }
        };
        renderCards();
    }
    document.getElementById('countTag').innerText=count+' 건';
    updateDiagState(currentSelectedData);
} // end _doUpdateView
function updateDiagState(selectedData) {
    const badgeContainer=document.getElementById('selectedBadgeContainer');
    const panel=document.getElementById('bottomDiagPanel');
    if(selectedData){
        document.getElementById('selectedBadge').innerText=`선택됨: 보 ${selectedData['보증금']} / 월 ${selectedData['월세']}`;
        badgeContainer.classList.remove('hidden'); badgeContainer.classList.add('flex');
        document.getElementById('diagZoneTitle').innerText=`📍 ZONE ${selectedData.zone} 상권 및 매물 진단`;
        document.getElementById('diagZoneDesc').innerText=zoneDescriptions[selectedData.zone]||'';
        const feat=selectedData['특징']||'정보 없음';
        document.getElementById('diagPropDesc').innerText=feat;
        // 도보정보 - 진단하기 클릭 시 채워짐
        const diagWalk=document.getElementById('diagWalkInfo');
        diagWalk.innerHTML='';
        // 임대료 분포 탭 zone에 맞게 업데이트
        updateStatsTab(selectedData.zone);
    } else {
        badgeContainer.classList.add('hidden'); badgeContainer.classList.remove('flex');
        panel.classList.remove('translate-y-0'); panel.classList.add('translate-y-full');
    }
}

function openDiag() {
    const panel=document.getElementById('bottomDiagPanel');
    panel.classList.remove('translate-y-full'); panel.classList.add('translate-y-0');

    // ── 진단하기 클릭 시 선택 매물 1개만 TMap 호출 ──
    if(!selectedId) return;
    const selProp = data.find(p=>p['ID(매물번호)']===selectedId);
    if(!selProp) return;

    // 점수 즉시 표시 (walk 없어도)
    renderScoreBadge(selProp);

    const diagWalk = document.getElementById('diagWalkInfo');

    // 이미 캐시된 결과가 있으면 바로 표시
    const cached = walkCache[selectedId];
    if(cached && cached.walk_min !== null) {
        renderWalkBadgeInDiag(cached);
        updateAccessTab();
        return;
    }

    // 캐시 없으면 이 매물 1개만 fetch
    diagWalk.innerHTML = `<span class="walk-badge walk-loading">🚶 도보시간 계산중...</span>`;
    fetchWalkTime(selProp).then(result => {
        if(result.walk_min !== null) {
            renderWalkBadgeInDiag(result);
        } else {
            diagWalk.innerHTML = `<span style="font-size:11px;color:#94a3b8;">도보시간 계산 불가 (API 차단)</span>`;
        }
        updateAccessTab();
    });
}

function renderWalkBadgeInDiag(result) {
    const diagWalk = document.getElementById('diagWalkInfo');
    if(!diagWalk) return;
    const cls = result.walk_min<=7?'walk-fast':result.walk_min<=12?'walk-mid':'walk-slow';
    diagWalk.innerHTML = `<span class="walk-badge ${cls}">🚶 홍대입구역 3번출구까지 ${result.walk_min}분 · ${result.walk_m}m</span>`;
    // 도보 완료 후 점수 재계산 (walk_m 반영)
    if(selectedId) {
        const p = data.find(d=>d['ID(매물번호)']===selectedId);
        if(p) renderScoreBadge(p);
    }
}
function closeDiag() {
    const panel=document.getElementById('bottomDiagPanel');
    panel.classList.remove('translate-y-0'); panel.classList.add('translate-y-full');
    clearRoute();
}

// 경로 레이어
let routeLayer = null;

function clearRoute() {
    if(routeLayer) { map.removeLayer(routeLayer); routeLayer = null; }
}

function drawRoute(coords) {
    clearRoute();
    // coords: [[lat,lon], ...] 배열
    routeLayer = L.polyline(coords, {
        color: '#3b82f6',
        weight: 4,
        opacity: 0.85,
        dashArray: '8, 6',
        lineJoin: 'round'
    }).addTo(map);
    map.fitBounds(routeLayer.getBounds(), {padding:[40,40]});
}

async function fetchAndDrawRoute(prop) {
    const res = await fetch('https://apis.openapi.sk.com/tmap/routes/pedestrian?version=1&format=json', {
        method: 'POST',
        headers: {'appKey': TMAP_KEY, 'Content-Type': 'application/json'},
        body: JSON.stringify({
            startX: ORIGIN.lon, startY: ORIGIN.lat,
            endX: prop['경도'], endY: prop['위도'],
            startName: '홍대입구역3번출구', endName: '매물',
            reqCoordType: 'WGS84GEO', resCoordType: 'WGS84GEO', speed: 4
        })
    });
    if(res.status === 403) { tmapBlocked = true; return; }
    const json = await res.json();
    // features에서 LineString 좌표 추출
    const coords = [];
    json.features.forEach(f => {
        if(f.geometry.type === 'LineString') {
            f.geometry.coordinates.forEach(c => coords.push([c[1], c[0]]));
        }
    });
    if(coords.length) drawRoute(coords);
}

function drawSpark(svgId, vals, color) {
    const svg=document.getElementById(svgId);
    if(!svg||!vals||!vals.length) return;
    const W=300,H=48;
    const mn=Math.min(...vals),mx=Math.max(...vals),rng=mx-mn||1;
    const pts=vals.map((v,i)=>[(i/(vals.length-1))*W, H-((v-mn)/rng)*(H-8)-4]);
    const path=pts.map((p,i)=>(i===0?`M${p[0]},${p[1]}`:`L${p[0]},${p[1]}`)).join(' ');
    svg.innerHTML=`<defs><linearGradient id="sg${svgId}" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="${color}" stop-opacity=".25"/>
        <stop offset="100%" stop-color="${color}" stop-opacity="0"/>
    </linearGradient></defs>
    <path d="${path} L${W},${H} L0,${H} Z" fill="url(#sg${svgId})"/>
    <path d="${path}" stroke="${color}" stroke-width="2" fill="none" stroke-linejoin="round" stroke-linecap="round"/>
    ${pts.map((p,i)=>i===pts.length-1?`<circle cx="${p[0]}" cy="${p[1]}" r="3" fill="${color}"/>`:'').join('')}`;
}

        const max = Math.max(...vals, ...(compare||[]));

        const step = (W - pad*2) / (vals.length);

            const h = Math.max(2, (v/max)*(H-4));
            bars += '<rect x="'+x+'" y="'+(H-h)+'" width="'+bw+'" height="'+h+'" rx="2" fill="'+color+'" opacity="0.85"/>';
            labels += '<text x="'+(x+bw/2)+'" y="'+(H+12)+'" text-anchor="middle" font-size="8" fill="#94a3b8">'+years[i]+'</text>';
        });
        if(compare) {

                const x = pad + i*step + step/2;
                const y = H - Math.max(2,(v/max)*(H-4));
                return x+','+y;
            }).join(' ');
            lines = '<polyline points="'+pts+'" fill="none" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="3,2"/>';

        return '<svg width="'+W+'" height="'+(H+16)+'" style="overflow:visible">'+bars+lines+labels+'</svg>';

            html += '<div style="background:#f0fdf4;border-radius:6px;padding:6px 10px;margin-bottom:6px;font-size:10px;color:#166534;line-height:1.5;">'+storeDesc+'</div>';

            html += '<div style="font-size:10px;font-weight:700;color:#475569;margin-bottom:6px;">📈 연도별 점포수 추이</div>'
                + '<div style="overflow-x:auto;"><svg width="300" height="100" style="overflow:visible;">';
            tvals.forEach((v,i) => {
                const x = 10 + i*(bw+4);
                const h = Math.max(4, Math.round((v-tmin)/(tmax-tmin+1)*65));
                const y = 72-h;
                const isLast = i===tvals.length-1;
                html += '<rect x="'+x+'" y="'+y+'" width="'+bw+'" height="'+h+'" rx="2" fill="'+(isLast?'#3b82f6':'#cbd5e1')+'"/>';
                html += '<text x="'+(x+bw/2)+'" y="84" text-anchor="middle" font-size="8" fill="#94a3b8">'+tyears[i]+'</text>';
                html += '<text x="'+(x+bw/2)+'" y="'+(y-4)+'" text-anchor="middle" font-size="8" font-weight="bold" fill="'+(isLast?'#2563eb':'#64748b')+'">'+v+'</text>';
            });
            html += '</svg></div>';

            // 개업/폐업 연도별
            if(st.open_by_year) {
                const ovals = st.open_by_year, cvals = st.close_by_year||[];
                const ocmax = Math.max(...ovals,...cvals,1);
                const bw2 = Math.floor((300-20)/ovals.length - 4);

                // 개업/폐업 설명
                const lastOpen = ovals[ovals.length-1], lastClose = cvals[cvals.length-1]||0;
                const netChg = lastOpen - lastClose;
                const openTrend = ovals[ovals.length-1] >= ovals[ovals.length-2] ? '증가' : '감소';
                const closeTrend = cvals[cvals.length-1] >= cvals[cvals.length-2] ? '증가' : '감소';
                const ocDesc = '최신 연도 개업 '+lastOpen+'건·폐업 '+lastClose+'건. '
                    + '개업은 <strong style="color:#1a8a4a;">'+openTrend+'추세</strong>, 폐업은 <strong style="color:#ef4444;">'+closeTrend+'추세</strong>입니다. '
                    + (netChg>=0?'순증가로 상권이 활성화되고 있습니다.':'순감소로 상권 변화에 주의가 필요합니다.');
                html += '<div style="font-size:10px;font-weight:700;color:#475569;margin:10px 0 4px;">📊 연도별 개업/폐업</div>'
                    + '<div style="background:#f8fafc;border-radius:6px;padding:6px 10px;margin-bottom:6px;font-size:10px;color:#475569;line-height:1.5;">'+ocDesc+'</div>'
                    + '<div style="font-size:9px;color:#94a3b8;display:flex;gap:10px;margin-bottom:4px;">'
                    + '<span><span style="display:inline-block;width:8px;height:8px;background:#1a8a4a;border-radius:1px;margin-right:3px;"></span>개업</span>'
                    + '<span><span style="display:inline-block;width:8px;height:8px;background:#ef4444;border-radius:1px;margin-right:3px;"></span>폐업</span>'
                    + '</div>'
                    + '<div style="overflow-x:auto;"><svg width="300" height="90" style="overflow:visible;">';
                ovals.forEach((ov,i) => {
                    const cv = cvals[i]||0;
                    const x = 10 + i*(bw2+4);
                    const oh = Math.max(2, Math.round(ov/ocmax*60));
                    const ch = Math.max(2, Math.round(cv/ocmax*60));
                    html += '<rect x="'+x+'" y="'+(65-oh)+'" width="'+(bw2/2-1)+'" height="'+oh+'" rx="1" fill="#1a8a4a" opacity="0.85"/>';
                    html += '<rect x="'+(x+bw2/2)+'" y="'+(65-ch)+'" width="'+(bw2/2-1)+'" height="'+ch+'" rx="1" fill="#ef4444" opacity="0.85"/>';
                    html += '<text x="'+(x+bw2/2)+'" y="77" text-anchor="middle" font-size="8" fill="#94a3b8">'+st.years[i]+'</text>';
                });
                html += '</svg></div>';
            }
        }
    } else if(sub==='consumption') {
        const cons = d.consumption;
        if(!cons) { el.innerHTML='<div style="padding:20px;text-align:center;color:#94a3b8;font-size:11px;">소비 데이터 없음</div>'; return; }

        // 설명
        html += '<div style="background:#fefce8;border-radius:8px;padding:8px 12px;margin-bottom:10px;font-size:10px;color:#854d0e;line-height:1.6;border-left:3px solid #facc15;">'
            + '이 상권은 <strong>'+cons.top_category+'</strong> 소비가 '+cons.top_pct+'%로 가장 높습니다. '
            + (cons.top_category==='음식'?'카페·외식 창업에 유리한 소비 구조입니다.':'소비 특성에 맞는 업종 검토가 필요합니다.')
            + '</div>';

        // 파이차트
        const cLabels = cons.labels, cVals = cons.values;
        const cColors = ['#3b82f6','#ec4899','#f59e0b','#10b981','#8b5cf6','#06b6d4','#f97316','#84cc16','#94a3b8'];
        function pieSeg(cx,cy,r,startDeg,endDeg,color) {
            const s=startDeg*Math.PI/180, e=endDeg*Math.PI/180;
            const x1=cx+r*Math.sin(s), y1=cy-r*Math.cos(s);
            const x2=cx+r*Math.sin(e), y2=cy-r*Math.cos(e);
            const large=(endDeg-startDeg)>180?1:0;
            return '<path d="M'+cx+','+cy+' L'+x1+','+y1+' A'+r+','+r+' 0 '+large+',1 '+x2+','+y2+' Z" fill="'+color+'"/>';
        }
        let cPieSvg = '<svg width="120" height="120"><g>';
        let cumDeg = 0;
        cVals.forEach((v,i) => {
            const deg = v/100*360;
            cPieSvg += pieSeg(60,60,52, cumDeg, cumDeg+deg, cColors[i]);
            cumDeg += deg;
        });
        cPieSvg += '<circle cx="60" cy="60" r="28" fill="white"/>';
        cPieSvg += '<text x="60" y="56" text-anchor="middle" font-size="10" font-weight="bold" fill="#1e293b">'+cons.top_category+'</text>';
        cPieSvg += '<text x="60" y="70" text-anchor="middle" font-size="9" fill="#64748b">'+cons.top_pct+'%</text>';
        cPieSvg += '</g></svg>';

        html += '<div style="font-size:10px;font-weight:700;color:#475569;margin-bottom:8px;">💳 소비 분포 (최신분기)</div>'
            + '<div style="display:flex;gap:10px;align-items:center;margin-bottom:12px;">'
            + cPieSvg
            + '<div style="font-size:9px;line-height:1.9;">';
        cLabels.forEach((l,i) => {
            html += '<div><span style="display:inline-block;width:8px;height:8px;background:'+cColors[i]+';border-radius:1px;margin-right:4px;"></span>'+l+' '+cVals[i]+'%</div>';
        });
        html += '</div></div>';

        // 가로 바차트
        const cmaxV = Math.max(...cVals);
        html += '<div style="font-size:10px;font-weight:700;color:#475569;margin-bottom:8px;">📊 항목별 소비 비율</div>';
        cLabels.forEach((l,i) => {
            const pct = Math.round(cVals[i]/cmaxV*100);
            html += '<div style="display:flex;align-items:center;gap:6px;margin-bottom:5px;">'
                + '<div style="width:36px;font-size:9px;color:#64748b;text-align:right;flex-shrink:0;">'+l+'</div>'
                + '<div style="flex:1;height:14px;background:#f1f5f9;border-radius:3px;overflow:hidden;">'
                + '<div style="height:100%;width:'+pct+'%;background:'+cColors[i]+';border-radius:3px;"></div></div>'
                + '<div style="width:32px;font-size:9px;color:#475569;text-align:right;">'+cVals[i]+'%</div>'
                + '</div>';
        });

        } else if(sub==='population') {
        const pop = d.population;
        const popmax = Math.max(...pop.values);
        const total = pop.values.reduce((a,b)=>a+b,0);
        const male = pop.male || 0;
        const female = pop.female || 0;
        const gTotal = male + female;

        // 성별 파이차트 SVG (12시 방향 시작)
        function piePath(cx, cy, r, startAngle, endAngle, color) {
            const s = startAngle * Math.PI / 180;
            const e = endAngle * Math.PI / 180;
            const x1 = cx + r * Math.sin(s);
            const y1 = cy - r * Math.cos(s);
            const x2 = cx + r * Math.sin(e);
            const y2 = cy - r * Math.cos(e);
            const large = (endAngle - startAngle) > 180 ? 1 : 0;
            return '<path d="M'+cx+','+cy+' L'+x1+','+y1+' A'+r+','+r+' 0 '+large+',1 '+x2+','+y2+' Z" fill="'+color+'"/>';
        }
        const malePct = gTotal > 0 ? male/gTotal : 0.5;
        const maleAngle = malePct * 360;
        const cx=62, cy=62, r=52;
        const pieSvg = '<svg width="124" height="124">'
            + piePath(cx,cy,r, 0, maleAngle, '#3b82f6')
            + piePath(cx,cy,r, maleAngle, 360, '#f472b6')
            + '<circle cx="'+cx+'" cy="'+cy+'" r="28" fill="white"/>'
            + '<text x="'+cx+'" y="'+(cy-4)+'" text-anchor="middle" font-size="11" font-weight="bold" fill="#1e293b">'+(malePct*100).toFixed(0)+'%</text>'
            + '<text x="'+cx+'" y="'+(cy+10)+'" text-anchor="middle" font-size="9" fill="#64748b">남성</text>'
            + '</svg>';

        html += '<div style="display:flex;align-items:center;gap:16px;margin-bottom:14px;">'
            + pieSvg
            + '<div>'
            +   '<div style="display:flex;align-items:center;gap:6px;margin-bottom:6px;">'
            +     '<span style="width:10px;height:10px;background:#3b82f6;border-radius:2px;display:inline-block;"></span>'
            +     '<span style="font-size:10px;color:#475569;">남성 '+(male/10000).toFixed(1)+'만 ('+(malePct*100).toFixed(1)+'%)</span>'
            +   '</div>'
            +   '<div style="display:flex;align-items:center;gap:6px;">'
            +     '<span style="width:10px;height:10px;background:#f472b6;border-radius:2px;display:inline-block;"></span>'
            +     '<span style="font-size:10px;color:#475569;">여성 '+(female/10000).toFixed(1)+'만 ('+((1-malePct)*100).toFixed(1)+'%)</span>'
            +   '</div>'
            +   '<div style="margin-top:8px;font-size:9px;color:#94a3b8;">총 상주인구</div>'
            +   '<div style="font-size:15px;font-weight:900;color:#1e293b;">'+(total/10000).toFixed(1)+'<span style="font-size:10px;color:#94a3b8;">만명</span></div>'
            + '</div>'
            + '</div>';

        // 설명
        const young = pop.values[1]+pop.values[2]; // 20+30대
        const youngPct = total>0?Math.round(young/total*100):0;
        const malePctNum = gTotal>0?Math.round(malePct*100):50;
        const popDesc = '20·30대 비율 '+youngPct+'%로 주요 소비층. 성별은 여성 '+Math.round((1-malePct)*100)+'% · 남성 '+malePctNum+'%입니다.';
        html += '<div style="background:#fdf4ff;border-radius:8px;padding:8px 12px;margin-bottom:10px;font-size:10px;color:#7e22ce;line-height:1.6;border-left:3px solid #c084fc;">'+popDesc+'</div>';

        html += '<div style="font-size:10px;font-weight:700;color:#475569;margin-bottom:10px;">👥 연령대별 분포</div>';
        const colors = ['#818cf8','#60a5fa','#34d399','#fbbf24','#f87171','#a78bfa'];
        // 가로 컬럼형 바차트
        html += '<div style="display:flex;gap:4px;align-items:flex-end;height:80px;margin-bottom:6px;">';
        pop.labels.forEach((l,i) => {
            const pct = Math.round(pop.values[i]/popmax*100);
            html += '<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;">'
                + '<div style="width:100%;background:#f1f5f9;border-radius:3px;height:70px;display:flex;align-items:flex-end;">'
                + '<div style="width:100%;height:'+pct+'%;background:'+colors[i]+';border-radius:3px 3px 0 0;"></div></div>'
                + '</div>';
        });
        html += '</div>';
        // 레이블 가로 나열
        html += '<div style="display:flex;gap:4px;">';
        pop.labels.forEach((l,i) => {
            html += '<div style="flex:1;text-align:center;font-size:9px;color:#64748b;">'+l+'</div>';
        });
        html += '</div>';
    }

    el.innerHTML = html;

    // AI 해석 박스 추가
    const aiBox = document.createElement('div');
    aiBox.style.cssText = 'margin-top:10px;background:#faf5ff;border-radius:8px;padding:10px 12px;border-left:3px solid #a855f7;font-size:10px;color:#6b21a8;line-height:1.7;';
    aiBox.innerHTML = '<div style="font-size:9px;font-weight:700;color:#a855f7;margin-bottom:4px;">✦ AI 상권 해석</div><div style="color:#94a3b8;">분석 중...</div>';
    el.appendChild(aiBox);

    getAiInsight(window._dashZone, sub, DASHBOARD_DATA[window._dashZone]).then(text => {
        if(text) aiBox.innerHTML = '<div style="font-size:9px;font-weight:700;color:#a855f7;margin-bottom:4px;">✦ AI 상권 해석</div>' + text;
        else aiBox.style.display = 'none';
    });
}

</script>
</body>
</html>
